# https://github.com/lima-vm/lima/blob/master/templates/default.yaml
# https://github.com/lima-vm/lima/blob/master/templates/_images/fedora-43.yaml
# https://github.com/lima-vm/lima/blob/master/templates/_default/mounts.yaml
# https://github.com/lima-vm/lima/blob/master/templates/podman.yaml

minimumLimaVersion: 2.0.0

vmType: krunkit
arch: aarch64
cpus: 2
memory: 4GiB
disk: 100GiB

images:
- location: "https://download.fedoraproject.org/pub/fedora/linux/releases/43/Cloud/x86_64/images/Fedora-Cloud-Base-Generic-43-1.6.x86_64.qcow2"
  arch: "x86_64"
  digest: "sha256:846574c8a97cd2d8dc1f231062d73107cc85cbbbda56335e264a46e3a6c8ab2f"
- location: "https://download.fedoraproject.org/pub/fedora/linux/releases/43/Cloud/aarch64/images/Fedora-Cloud-Base-Generic-43-1.6.aarch64.qcow2"
  arch: aarch64
  digest: "sha256:66031aea9ec61e6d0d5bba12b9454e80ca94e8a79c913d37ded4c60311705b8b"

mounts:
- location: "~/src"
  mountPoint: "{{.Home}}/src"
  writable: true
- location: "~/.config/opencode"
  mountPoint: "{{.Home}}/.config/opencode"
  writable: true
- location: "~/.local/share/opencode"
  mountPoint: "{{.Home}}/.local/share/opencode"
  writable: true

containerd:
  system: false
  user: false

provision:
- mode: system
  script: |
    #!/bin/bash
    set -eux -o pipefail

    # Install Podman
    dnf install -y podman

    # Install common packages
    dnf install -y \
      bind-utils \
      unrar \
      xq \
      jq \
      yq \
      fd-find \
      fzf \
      bc \
      ripgrep \
      unzip \
      wget \
      which

    # Install development tools
    dnf install -y \
      nodejs24 \
      pnpm \
      golang \
      python3 \
      python3-pip \
      uv \
      ruff \
      ty \
      opentofu \
      kubernetes1.35-client \
      helm \
      make \
      gcc-c++ \
      clang \
      clang-tools-extra \
      llvm
    
- mode: user
  script: |
    #!/bin/bash
    set -eux -o pipefail

    # Enable podman's socket
    systemctl --user enable --now podman.socket

    # User env vars and PATH
    tee ~/.bash_profile << 'EOF'
    export PATH=$PATH:${HOME}/.npm-global/bin:${HOME}/.go/bin
    export GOPATH=${HOME}/.go
    export NPM_CONFIG_PREFIX=${HOME}/.npm-global
    EOF

    # Install OpenCode
    export NPM_CONFIG_PREFIX="${HOME}/.npm-global"
    npm install -g opencode-ai
    npm cache clean --force

probes:
- script: |
    #!/bin/bash
    set -eux -o pipefail

    # Check if OpenCode is installed
    if ! timeout 300s bash -c 'until [ -f "$HOME/.npm-global/bin/opencode" ]; do sleep 3; done'; then
      echo >&2 "OpenCode is not installed yet"
      exit 1
    fi
  hint: See "/var/log/cloud-init-output.log" in the guest

portForwards:
- guestSocket: "/run/user/{{.UID}}/podman/podman.sock"
  hostSocket: "{{.Dir}}/sock/podman.sock"

message: |
  To access the VM: limactl shell fedora-agent